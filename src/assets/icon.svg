<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9A56"/>
      <stop offset="100%" stop-color="#E85D26"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD6A8"/>
      <stop offset="100%" stop-color="#FFB870"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <!-- Left ear -->
  <path d="M130 200 L100 80 L200 160 Z" fill="#FFB870" stroke="#E8802A" stroke-width="6" stroke-linejoin="round"/>
  <!-- Right ear -->
  <path d="M382 200 L412 80 L312 160 Z" fill="#FFB870" stroke="#E8802A" stroke-width="6" stroke-linejoin="round"/>
  <!-- Inner left ear -->
  <path d="M138 188 L118 105 L192 162 Z" fill="#FF9A7A"/>
  <!-- Inner right ear -->
  <path d="M374 188 L394 105 L320 162 Z" fill="#FF9A7A"/>
  <!-- Head/face -->
  <ellipse cx="256" cy="280" rx="155" ry="140" fill="url(#face)"/>
  <!-- Left eye -->
  <ellipse cx="205" cy="260" rx="22" ry="26" fill="#2F2215"/>
  <ellipse cx="212" cy="252" rx="8" ry="9" fill="#FFFFFF"/>
  <!-- Right eye -->
  <ellipse cx="307" cy="260" rx="22" ry="26" fill="#2F2215"/>
  <ellipse cx="314" cy="252" rx="8" ry="9" fill="#FFFFFF"/>
  <!-- Nose -->
  <path d="M250 300 L256 310 L262 300 Z" fill="#E8802A"/>
  <!-- Mouth -->
  <path d="M256 310 Q240 330 228 318" fill="none" stroke="#C06020" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M256 310 Q272 330 284 318" fill="none" stroke="#C06020" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left whiskers -->
  <line x1="80" y1="278" x2="175" y2="295" stroke="#C06020" stroke-width="3" stroke-linecap="round"/>
  <line x1="85" y1="305" x2="178" y2="310" stroke="#C06020" stroke-width="3" stroke-linecap="round"/>
  <line x1="92" y1="332" x2="180" y2="322" stroke="#C06020" stroke-width="3" stroke-linecap="round"/>
  <!-- Right whiskers -->
  <line x1="432" y1="278" x2="337" y2="295" stroke="#C06020" stroke-width="3" stroke-linecap="round"/>
  <line x1="427" y1="305" x2="334" y2="310" stroke="#C06020" stroke-width="3" stroke-linecap="round"/>
  <line x1="420" y1="332" x2="332" y2="322" stroke="#C06020" stroke-width="3" stroke-linecap="round"/>
  <!-- Cheek blush -->
  <ellipse cx="175" cy="310" rx="25" ry="16" fill="#FF9A7A" opacity="0.5"/>
  <ellipse cx="337" cy="310" rx="25" ry="16" fill="#FF9A7A" opacity="0.5"/>
</svg>
